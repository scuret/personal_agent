{% extends "base.html" %}
{% block title %}triggers.yaml · config · personal_agent{% endblock %}
{% block content %}

<div class="flex items-baseline justify-between mb-4">
    <h1 class="text-2xl font-semibold">triggers.yaml</h1>
    <a href="/config" class="text-sm text-zinc-400 hover:text-zinc-200">← config</a>
</div>

{% if saved %}
<div class="mb-4 px-4 py-2 rounded bg-emerald-500/10 border border-emerald-700 text-emerald-200 text-sm">
    saved. scheduler will pick up changes on its next tick (~30s).
</div>
{% endif %}

<form method="post">
    <textarea name="content" rows="30" required
              class="w-full px-3 py-2 rounded bg-zinc-900 border border-zinc-800 text-sm
                     mono leading-relaxed focus:outline-none focus:border-zinc-600">{{ content }}</textarea>
    <div class="mt-3 flex justify-end">
        <button class="px-4 py-2 rounded bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-medium">save</button>
    </div>
</form>
{% endblock %}
