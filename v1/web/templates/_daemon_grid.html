{# Just the inner tiles — used by HTMX polling on the dashboard. #}
{% for d in daemons %}
<div class="rounded-lg border border-zinc-800 bg-zinc-900/40 p-4">
    <div class="flex items-center justify-between">
        <span class="font-medium text-sm">{{ d.name }}</span>
        {% if d.loaded %}
            <span class="text-xs px-2 py-0.5 rounded-full bg-emerald-500/15 text-emerald-300">
                running{% if d.pid %} · pid {{ d.pid }}{% endif %}
            </span>
        {% else %}
            <span class="text-xs px-2 py-0.5 rounded-full bg-rose-500/15 text-rose-300">
                down
            </span>
        {% endif %}
    </div>
    <div class="mt-3 flex gap-2 text-xs">
        <button hx-post="/daemon/{{ d.name }}/restart"
                hx-swap="none"
                class="px-2 py-1 rounded bg-zinc-800 hover:bg-zinc-700">restart</button>
        <a href="/observability/logs/{{ d.name }}"
           class="px-2 py-1 rounded bg-zinc-800 hover:bg-zinc-700">logs</a>
    </div>
</div>
{% endfor %}
