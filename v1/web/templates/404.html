{% extends "base.html" %}
{% block title %}not found · personal_agent{% endblock %}
{% block content %}
<div class="max-w-md mx-auto text-center py-16">
    <p class="text-zinc-500 text-sm uppercase tracking-wider">404</p>
    <h1 class="text-2xl font-semibold mt-2">page not found</h1>
    <p class="text-zinc-400 mt-2">
        path <code class="text-zinc-200">{{ request.url.path }}</code> doesn't exist.
    </p>
    <a href="/" class="inline-block mt-6 px-4 py-2 rounded-md bg-zinc-800 hover:bg-zinc-700 text-sm">
        back to dashboard
    </a>
</div>
{% endblock %}
